name: roomix
description: "Roomix - Find PGs, Mess, and Roommates near your campus"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI and Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.15
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_spinkit: ^5.2.0
  
  # State management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^14.2.7
  
  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  
  # Maps and location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.0
  
  # WebView for maps
  webview_flutter: ^4.8.0
  
  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  
  # Date and time
  intl: ^0.19.0
  
  # Platform detection
  platform_detect: ^2.0.0
  
  # Form validation
  form_field_validator: ^1.1.0

  # URL launcher
  url_launcher: ^6.3.0
  
  # Google authentication
  google_sign_in: ^6.1.5
  
  # Firebase - Full Backend
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.4
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.0.0
  
  # Web-specific packages
  web: ^1.0.0
  js: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - lib/maps_keys/

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
